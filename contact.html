  <div class="container">
    <section class="contact-section">
      <h1><i class="fas fa-envelope"></i> Get In Touch</h1>
      <p>Feel free to reach out to me for any questions or opportunities. I'll get back to you as soon as possible!</p>
      
      <div class="contact-container">
        <form id="contactForm" class="contact-form">
          <div class="form-group">
            <label for="name">Your Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required>
            <div class="error-message" id="nameError"></div>
          </div>
          
          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <div class="error-message" id="emailError"></div>
          </div>
          
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter your phone number (optional)">
            <div class="error-message" id="phoneError"></div>
          </div>
          
          <div class="form-group">
            <label for="subject">Subject <span class="required">*</span></label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?" required>
            <div class="error-message" id="subjectError"></div>
          </div>
          
          <div class="form-group">
            <label for="message">Your Message <span class="required">*</span></label>
            <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>
            <div class="error-message" id="messageError"></div>
          </div>
          
          <button type="submit" class="submit-btn">
            <i class="fas fa-paper-plane"></i> Send Message
          </button>
          
          <div id="formMessage" class="form-message"></div>
        </form>
        
        <div class="contact-info">
          <h3>Contact Information</h3>
          <p><i class="fas fa-map-marker-alt"></i> Hyderabad, India</p>
          <p><i class="fas fa-envelope"></i> pkannamalla@gmail.com</p>
          <p><i class="fas fa-phone"></i> +91 8143146287</p>
          
          <div class="social-links">
            <h3>Connect With Me</h3>
            <a href="https://github.com/pavan-kumar-5" target="_blank" title="GitHub" rel="noopener noreferrer">
              <i class="fab fa-github"></i>

              <i class="fab fa-youtube"></i>
            </a>
          </div>
        </div>
      </div>
